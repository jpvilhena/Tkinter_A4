<<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MudaExpress — Painel</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
</head>
<body>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Novo registro</h2>
      <div id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn" id="modal-cancel">Cancelar</button>
        <button class="btn btn-primary" id="modal-save">Salvar</button>
      </div>
    </div>
  </div>

  <div class="app">
    <nav class="sidebar" aria-label="Navegação principal">
      <div class="sidebar-brand">
        <i class="ti ti-truck-delivery" aria-hidden="true"></i>
        <span>MudaExpress</span>
      </div>
      <ul class="nav-list" role="list">
        <li><button class="nav-item active" data-page="clientes" aria-current="page"><i class="ti ti-users" aria-hidden="true"></i> Clientes</button></li>
        <li><button class="nav-item" data-page="caminhoes"><i class="ti ti-truck" aria-hidden="true"></i> Caminhões</button></li>
        <li><button class="nav-item" data-page="prestadores"><i class="ti ti-id-badge" aria-hidden="true"></i> Prestadores</button></li>
        <li><button class="nav-item" data-page="servicos"><i class="ti ti-package" aria-hidden="true"></i> Serviços</button></li>
        <li><button class="nav-item" data-page="contratos"><i class="ti ti-file-text" aria-hidden="true"></i> Contratos</button></li>
        <li><button class="nav-item" data-page="alocacoes"><i class="ti ti-calendar-event" aria-hidden="true"></i> Alocações</button></li>
        <li><button class="nav-item" data-page="cprestadores"><i class="ti ti-link" aria-hidden="true"></i> Vínculos</button></li>
      </ul>
    </nav>

    <main class="main" id="main-content">

      <section class="page active" id="page-clientes" aria-label="Clientes">
        <div class="page-header">
          <h1>Clientes</h1>
          <button class="btn btn-primary" data-create="clientes"><i class="ti ti-plus" aria-hidden="true"></i> Novo cliente</button>
        </div>
        <div class="table-card"><div id="table-clientes" class="table-wrap"></div></div>
      </section>

      <section class="page" id="page-caminhoes" aria-label="Caminhões">
        <div class="page-header">
          <h1>Caminhões</h1>
          <button class="btn btn-primary" data-create="caminhoes"><i class="ti ti-plus" aria-hidden="true"></i> Novo caminhão</button>
        </div>
        <div class="table-card"><div id="table-caminhoes" class="table-wrap"></div></div>
      </section>

      <section class="page" id="page-prestadores" aria-label="Prestadores">
        <div class="page-header">
          <h1>Prestadores</h1>
          <button class="btn btn-primary" data-create="prestadores"><i class="ti ti-plus" aria-hidden="true"></i> Novo prestador</button>
        </div>
        <div class="table-card"><div id="table-prestadores" class="table-wrap"></div></div>
      </section>

      <section class="page" id="page-servicos" aria-label="Serviços">
        <div class="page-header">
          <h1>Serviços oferecidos</h1>
          <button class="btn btn-primary" data-create="servicos"><i class="ti ti-plus" aria-hidden="true"></i> Novo serviço</button>
        </div>
        <div class="table-card"><div id="table-servicos" class="table-wrap"></div></div>
      </section>

      <section class="page" id="page-contratos" aria-label="Contratos">
        <div class="page-header">
          <h1>Contratos de mudança</h1>
          <button class="btn btn-primary" data-create="contratos"><i class="ti ti-plus" aria-hidden="true"></i> Novo contrato</button>
        </div>
        <div class="table-card"><div id="table-contratos" class="table-wrap"></div></div>
      </section>

      <section class="page" id="page-alocacoes" aria-label="Alocações">
        <div class="page-header">
          <h1>Alocações de serviço</h1>
          <button class="btn btn-primary" data-create="alocacoes"><i class="ti ti-plus" aria-hidden="true"></i> Nova alocação</button>
        </div>
        <div class="table-card"><div id="table-alocacoes" class="table-wrap"></div></div>
      </section>

      <section class="page" id="page-cprestadores" aria-label="Vínculos">
        <div class="page-header">
          <h1>Vínculos contrato–prestador</h1>
          <button class="btn btn-primary" data-create="cprestadores"><i class="ti ti-plus" aria-hidden="true"></i> Novo vínculo</button>
        </div>
        <div class="table-card"><div id="table-cprestadores" class="table-wrap"></div></div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>>
